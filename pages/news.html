<!-- /hospital-news.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital News & Events</title>

  <style>
    /* WHY: reset default browser styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fa;
      padding-bottom: 80px; /* WHY: space for fixed nav */
    }

    header {
      padding: 20px;
      text-align: center;
      background: #0b6efd;
      color: white;
    }

    /* GRID LAYOUT */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    /* CARD */
    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .card p {
      color: #555;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .btn {
      background: #0b6efd;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* FIXED NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: white;
      border-top: 1px solid #ddd;
      padding: 10px 0;
    }

    .nav-item {
      cursor: pointer;
      padding: 10px;
      color: #555;
    }

    .active {
      color: #0b6efd;
      font-weight: bold;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      max-width: 600px;
      width: 90%;
      padding: 20px;
      border-radius: 10px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .close {
      float: right;
      cursor: pointer;
      font-size: 20px;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .card img {
        height: 150px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Hospital News & Events</h1>
</header>

<div class="container" id="newsContainer"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <h2 id="modalTitle"></h2>
    <img id="modalImage" style="width:100%; margin:10px 0;" />
    <p id="modalContent"></p>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="filterNews('all', this)">All</div>
  <div class="nav-item" onclick="filterNews('health', this)">Health</div>
  <div class="nav-item" onclick="filterNews('event', this)">Event</div>
</div>

<script>
  /* WHY: central data storage */
  const newsData = [
    {
      title: "New Cardiology Unit Opened",
      category: "event",
      image: "https://images.unsplash.com/photo-1586773860418-d37222d8fce3",
      intro: "Our hospital launches a new advanced cardiology unit...",
      full: "Our hospital proudly opened a state-of-the-art cardiology unit equipped with modern diagnostic tools and expert specialists.",
      date: "2026-03-10"
    },
    {
      title: "Tips for Healthy Living",
      category: "health",
      image: "https://images.unsplash.com/photo-1498837167922-ddd27525d352",
      intro: "Learn simple daily habits to improve your health...",
      full: "Maintain a balanced diet, exercise regularly, and schedule routine checkups for a healthier life.",
      date: "2026-03-15"
    },
    {
      title: "Free Medical Outreach",
      category: "event",
      image: "https://images.unsplash.com/photo-1584515933487-779824d29309",
      intro: "Join our free community medical outreach...",
      full: "We are offering free consultations, screenings, and medications to underserved communities.",
      date: "2026-03-18"
    }
  ];

  /* WHY: latest first */
  function sortByDate(data) {
    return data.sort((a, b) => new Date(b.date) - new Date(a.date));
  }

  /* RENDER CARDS */
  function renderNews(data) {
    const container = document.getElementById("newsContainer");
    container.innerHTML = "";

    data.forEach(item => {
      const card = `
        <div class="card">
          <img src="${item.image}" />
          <div class="card-content">
            <h3>${item.title}</h3>
            <p>${item.intro}</p>
            <button class="btn" onclick='openModal(${JSON.stringify(item)})'>Read All</button>
          </div>
        </div>
      `;
      container.innerHTML += card;
    });
  }

  /* FILTER */
  function filterNews(category, element) {
    document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
    element.classList.add("active");

    if (category === "all") {
      renderNews(sortByDate(newsData));
    } else {
      const filtered = newsData.filter(n => n.category === category);
      renderNews(sortByDate(filtered));
    }
  }

  /* MODAL OPEN */
  function openModal(item) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalTitle").innerText = item.title;
    document.getElementById("modalImage").src = item.image;
    document.getElementById("modalContent").innerText = item.full;
  }

  /* MODAL CLOSE */
  function closeModal() {
    document.getElementById("modal").style.display = "none";
  }

  /* INITIAL LOAD */
  renderNews(sortByDate(newsData));
</script>

</body>
</html>
