    <style>
      /* Reset and base styles */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }
      body {
        background-color: #f8f9fa;
        padding-bottom: 120px;
      }

      /* Container for news */
      .news-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      /* News card styling */
      .news-card {
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .news-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        transition: all 0.3s ease;
      }

      .news-card.expanded img {
        height: auto; /* Expand image to full width */
        max-height: 80vh; /* Fit large screens but not overflow */
      }

      .news-card-content {
        padding: 15px;
      }

      .news-card h2 {
        font-size: 1.3rem;
        margin-bottom: 10px;
        color: #1f3a93;
      }

      .news-card p {
        font-size: 1rem;
        color: #555;
        line-height: 1.5;
      }

      .read-all-btn,
      .close-btn {
        display: inline-block;
        margin-top: 10px;
        padding: 8px 15px;
        background-color: #1f3a93;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.9rem;
      }

      .read-all-btn:hover,
      .close-btn:hover {
        background-color: #162c6f;
      }

      /* Search bar fixed above nav */
      .search-bar {
        position: fixed;
        bottom: 60px;
        left: 0;
        width: 100%;
        background: #fff;
        padding: 10px 20px;
        border-top: 1px solid #ddd;
        display: flex;
        align-items: center;
        z-index: 100;
      }
      .search-bar input {
        flex: 1;
        padding: 10px 15px;
        border-radius: 20px;
        border: 1px solid #ccc;
        font-size: 1rem;
      }

      /* Bottom navigation bar */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background-color: #1f3a93;
        display: flex;
        justify-content: space-around;
        padding: 15px 0;
        z-index: 100;
      }
      .bottom-nav button {
        background: none;
        border: none;
        color: white;
        font-size: 1rem;
        cursor: pointer;
      }
      .bottom-nav button.active {
        border-bottom: 3px solid #ffcc00;
        padding-bottom: 5px;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .news-card img {
          height: 150px;
        }
        .news-card h2 {
          font-size: 1.1rem;
        }
        .news-card p {
          font-size: 0.95rem;
        }
      }
    </style>

      const newsContainer = document.getElementById("newsContainer");

      // Display news function
      function displayNews(newsArray) {
        newsContainer.innerHTML = "";
        newsArray.forEach((news) => {
          const card = document.createElement("div");
          card.className = "news-card";
          card.innerHTML = `
      <img src="${news.image}" alt="${news.title}">
      <div class="news-card-content">
        <h2>${news.title}</h2>
        <p class="preview">${news.content.substring(0, 150)}...</p>
        <p class="full" style="display:none;">${news.content}</p>
        <button class="read-all-btn">Read All</button>
        <button class="close-btn" style="display:none;">Close</button>
      </div>
    `;
          // Add event listeners
          const readBtn = card.querySelector(".read-all-btn");
          const closeBtn = card.querySelector(".close-btn");
          const preview = card.querySelector(".preview");
          const full = card.querySelector(".full");

          readBtn.addEventListener("click", () => {
            preview.style.display = "none";
            full.style.display = "block";
            card.classList.add("expanded"); // Make image expand
            readBtn.style.display = "none";
            closeBtn.style.display = "inline-block";
          });

          closeBtn.addEventListener("click", () => {
            preview.style.display = "block";
            full.style.display = "none";
            card.classList.remove("expanded");
            readBtn.style.display = "inline-block";
            closeBtn.style.display = "none";
          });

          newsContainer.appendChild(card);
        });
      }

      // Search news
      function searchNews() {
        const query = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const filtered = newsData.filter(
          (n) =>
            n.title.toLowerCase().includes(query) ||
            n.content.toLowerCase().includes(query),
        );
        displayNews(filtered);
      }

      // Filter news function
      function filterNews(category, eventObj) {
        // Remove active from all buttons
        const buttons = document.querySelectorAll(".bottom-nav button");
        buttons.forEach((btn) => btn.classList.remove("active"));

        // Set active button
        eventObj.target.classList.add("active");

        // Filter news
        let filtered;
        if (category === "all") filtered = newsData;
        else filtered = newsData.filter((n) => n.category === category);

        displayNews(filtered);
      }

      // Initial display
      displayNews(newsData);
    </script>
